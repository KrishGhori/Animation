<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Ball Movement</title>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f0f0f0;
}

.container{
width:800px;
height:400px;
border:2px solid #333;
position:relative;
overflow:hidden;
}

.round{
width:40px;
height:40px;
background:red;
border-radius:50%;
position:absolute;
}

</style>
</head>

<body>

<div class="container">
<div class="round"></div>
</div>

<script>

const ball=document.querySelector(".round");
const box=document.querySelector(".container");

function moveRandom(){

const x=Math.random()*(box.clientWidth-40);
const y=Math.random()*(box.clientHeight-40);

ball.style.left=x+"px";
ball.style.top=y+"px";

}

setInterval(moveRandom,500);

</script>

</body>
</html>
