<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Box</title>
    <style>

body{
background:#111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
gap:20px;
}

.container{
width:90%;
max-width:900px;
height:400px;
background:#222;
border:2px solid #444;
position:relative;
overflow:hidden;
}

.round{
width:50px;
height:50px;
background:cyan;
border-radius:50%;
position:absolute;
animation:zigzagLine 3s infinite linear;
box-shadow:0 0 20px cyan,0 0 40px cyan;
}

@keyframes zigzagLine{
0%{transform:translate(0,40px);}
25%{transform:translate(200px,300px);}
50%{transform:translate(400px,50px);}
75%{transform:translate(600px,300px);}
100%{transform:translate(900px,40px);}
}

</style>
</head>
<body>
    <div class="container">
    <div class="round"></div>
    </div>
</body>
</html>
