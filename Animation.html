<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Box</title>

<style>

body{
background:#f0f0f0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:90%;
height:400px;
background:#e0e0e0;
border:2px solid #ccc;
position:relative;
overflow:hidden;
}

.round{
width:50px;
height:50px;
background:rgb(62,35,25);
border-radius:50%;
position:absolute;
animation:zigzagLine 3s infinite linear;
}

@keyframes zigzagLine{

0%{left:0; top:10%;}
15%{left:15%; top:80%;}
30%{left:30%; top:30%;}
45%{left:45%; top:80%;}
60%{left:60%; top:30%;}
75%{left:75%; top:80%; background:aqua;}
85%{left:85%; top:30%;}
100%{left:100%; top:80%;}

}

</style>
</head>

<body>

<div class="container">
<div class="round"></div>
</div>

</body>
</html>
