<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animation Box</title>

<style>

body{
background:#f0f0f0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:90%;
height:400px;
background:#e0e0e0;
border:2px solid #ccc;
position:relative;
overflow:hidden;
}

.round{
width:50px;
height:50px;
background:brown;
border-radius:50%;
position:absolute;
animation:zigzagLine 3s infinite linear;
}

</style>
</head>

<body>

<div class="container">
<div class="round"></div>
</div>

</body>
</html>
