<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Box</title>

<style>

body{
background:#f0f0f0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:90%;
height:400px;
background:#e0e0e0;
border:2px solid #ccc;
position:relative;
overflow:hidden;
}

.round{
width:50px;
height:50px;
background:rgb(62,35,25);
border-radius:50%;
position:absolute;
animation:zigzagLine 3s infinite linear;
}

.round:hover{
animation-play-state: paused;
cursor:pointer;
}

@keyframes zigzagLine{
0%{transform:translate(0,40px);}
25%{transform:translate(200px,300px);}
50%{transform:translate(400px,50px);}
75%{transform:translate(600px,300px);}
100%{transform:translate(900px,40px);}
}



</style>
</head>

<body>

<div class="container">
<div class="round"></div>
<div class="round delay1"></div>
<div class="round delay2"></div>
</div>
<button onclick="slow()">Slow</button>
<button onclick="fast()">Fast</button>

</body>
</html>
